<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>اختيار المنصة | Launch Quality LLC</title>
  <style>
    :root{
      --bg1:#f7faff;
      --bg2:#ebf2fc;
      --panel:#ffffff;
      --line:#d9e4f4;
      --text:#1f2d3d;
      --muted:#5f738d;
      --brand:#2f6fec;
      --brand-dark:#1f4ea5;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Tajawal,Segoe UI,Arial,sans-serif;
      background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%);
      color:var(--text);
      display:grid;
      place-items:center;
      padding:20px;
    }
    .shell{
      width:min(980px,100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 14px 36px rgba(35,62,110,.1);
      padding:24px;
    }
    .head{
      text-align:center;
      margin-bottom:20px;
    }
    .head h1{
      margin:0 0 6px;
      font-size:30px;
      color:var(--brand-dark);
    }
    .head p{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }
    .choices{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:20px;
      margin-top:14px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      padding:20px;
      text-align:center;
      box-shadow:0 10px 24px rgba(35,62,110,.08);
    }
    .circle{
      width:170px;
      height:170px;
      margin:0 auto 12px;
      border-radius:50%;
      border:4px solid #c7d8f4;
      box-shadow:0 10px 28px rgba(35,62,110,.12);
      overflow:hidden;
      display:grid;
      place-items:center;
      background:#eef4ff;
      position:relative;
    }
    .circle.realestate img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .circle.hospitality{
      background:radial-gradient(circle at 35% 30%, #ffffff 0%, #e8f1ff 55%, #d9e8ff 100%);
      color:#1f4ea5;
      font-size:72px;
      font-weight:700;
    }
    .circle.accounting{
      background:radial-gradient(circle at 35% 30%, #ffffff 0%, #f0f7ff 55%, #dcecff 100%);
      color:#1f4ea5;
      font-size:64px;
      font-weight:700;
    }
    .card h3{
      margin:4px 0 4px;
      font-size:24px;
      color:var(--brand-dark);
    }
    .card p{
      margin:0 0 14px;
      color:var(--muted);
      font-size:14px;
    }
    .btn{
      border:1px solid #285fca;
      border-radius:10px;
      padding:11px 14px;
      background:linear-gradient(145deg,#3d81ff,#2f6fec);
      color:#fff;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      min-width:160px;
    }
    .btn:hover{filter:brightness(1.04)}
    .foot{
      text-align:center;
      margin-top:16px;
      color:#70839c;
      font-size:13px;
    }
    @media (max-width:900px){
      .choices{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="head">
      <h1>اختر منصة العمل</h1>
      <p>بعد تسجيل الدخول، اختر مسار الدخول المناسب.</p>
    </header>

    <section class="choices">
      <article class="card">
        <div class="circle realestate" aria-label="العقارات">
          <img src="/assets/login-portal-bg.png" alt="منصة العقارات">
        </div>
        <h3>منصة العقارات</h3>
        <p>إدارة المشاريع، العقود، الفواتير، والصيانة.</p>
        <button class="btn" type="button" onclick="enterPortal('realestate')">دخول العقارات</button>
      </article>

      <article class="card">
        <div class="circle hospitality" aria-label="الضيافة">🏨</div>
        <h3>منصة الضيافة</h3>
        <p>إدارة الغرف، الحجوزات، التحصيل، وتقارير الإشغال.</p>
        <button class="btn" type="button" onclick="enterPortal('hospitality')">دخول الضيافة</button>
      </article>

      <article class="card">
        <div class="circle accounting" aria-label="المحاسبة">💼</div>
        <h3>منصة المحاسبة</h3>
        <p>القيود، التحصيل، الذمم، التسويات، وإقفال الفترات.</p>
        <button class="btn" type="button" onclick="enterPortal('accounting')">دخول المحاسبة</button>
      </article>
    </section>

    <div class="foot">Launch Quality LLC</div>
  </main>

  <script>
    function readToken() {
      try {
        const qs = new URLSearchParams(location.search || "");
        const qTok = (qs.get("token") || "").trim();
        if (qTok) {
          localStorage.setItem("jawdah_cloud_token", qTok);
          qs.delete("token");
          const next = location.pathname + (qs.toString() ? ("?" + qs.toString()) : "");
          history.replaceState({}, "", next);
          return qTok;
        }
      } catch (_) {}
      // Cookie fallback if localStorage was cleared mid-navigation
      try {
        const m = document.cookie.match(/(?:^|;\s*)lq_token=([^;]+)/);
        if (m && m[1]) {
          const cTok = decodeURIComponent(m[1]).trim();
          if (cTok) {
            localStorage.setItem("jawdah_cloud_token", cTok);
            return cTok;
          }
        }
      } catch (_) {}
      return (localStorage.getItem("jawdah_cloud_token") || "").trim();
    }

    function goLogin(reason) {
      // Never wipe token here — app login shell decides
      location.replace("/app.html?v=" + encodeURIComponent(reason || "need-login"));
    }

    async function enterPortal(choice) {
      const token = readToken();
      const c = (choice === "hospitality") ? "hospitality" : ((choice === "accounting") ? "accounting" : "realestate");
      localStorage.setItem("jawdah_portal_choice", c);
      if (token) localStorage.setItem("jawdah_cloud_token", token);
      // Always carry portal + token in the URL so app.html never falls back to login
      let url = "/app.html?portal=" + encodeURIComponent(c) + "&t=" + Date.now();
      if (token) url += "&token=" + encodeURIComponent(token);
      location.replace(url);
    }

    // Keep platforms page visible. Only bounce to login if there is truly no session.
    (function boot() {
      const token = readToken();
      if (!token) goLogin("need-login");
    })();
  </script>
</body>
</html>
